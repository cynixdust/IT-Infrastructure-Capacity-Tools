<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SABA IT Infrastructure Capacity Tools</title>
    
    <!-- Core Libraries (CDNs) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Icons & Charts -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/recharts@2.12.2/umd/Recharts.min.js"></script>
    
    <!-- Animations -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <!-- Export Libraries -->
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/jspdf@latest/dist/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/jspdf-autotable@latest/dist/jspdf.plugin.autotable.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap');

        :root {
            --bg: #f8f6f2;
            --bg-card: #ffffff;
            --bg-input: #ffffff;
            --border: #e2e0db;
            --text-primary: #2d2d2d;
            --text-sec: #6b6b6b;
            --text-mono: #1a1a1a;
            --accent: #1b5e20;
            --accent-dim: rgba(27, 94, 32, 0.08);
            --ok: #1b5e20;
            --ok-bg: #e8f5e9;
            --hi: #f57f17;
            --hi-bg: #fff9c4;
            --ov: #b71c1c;
            --ov-bg: #ffebee;
            --gauge: #e0e0e0;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.03);
            --prtg-green: #00b050;
            --prtg-yellow: #ffc000;
            --prtg-red: #ff0000;
            --prtg-blue: #00b0f0;
            --prtg-gray: #a6a6a6;
            --r: 4px;
        }

        .theme-dark {
            --bg: #111210;
            --bg-card: #1c1c1a;
            --bg-input: #252521;
            --border: #333330;
            --text-primary: #f0ede8;
            --text-sec: #9a9690;
            --text-mono: #d0cdc8;
            --accent: #e8722a;
            --accent-dim: rgba(232, 114, 42, 0.14);
            --ok: #2ecc71;
            --ok-bg: rgba(46, 204, 113, 0.12);
            --hi: #f0a500;
            --hi-bg: rgba(240, 165, 0, 0.12);
            --ov: #e74c3c;
            --ov-bg: rgba(231, 76, 60, 0.12);
            --gauge: #2c2c2a;
            --shadow: 0 2px 24px rgba(0, 0, 0, 0.35);
        }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            transition: background-color 0.25s ease;
        }

        .font-mono { font-family: 'JetBrains Mono', monospace; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-sec); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root">
        <div class="flex items-center justify-center min-h-screen font-sans text-gray-500">
            <div class="text-center">
                <div class="inline-block w-8 h-8 border-4 border-green-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p>Initializing SABA Capacity Tools...</p>
            </div>
        </div>
    </div>

    <!-- Global SVG Definitions for PRTG-style 3D Effects -->
    <svg width="0" height="0" style="position: absolute;">
      <defs>
        <linearGradient id="prtgGreen" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#26e686" /><stop offset="48%" stop-color="#00b050" /><stop offset="50%" stop-color="#009a46" /><stop offset="100%" stop-color="#00803a" />
        </linearGradient>
        <linearGradient id="prtgOrange" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#ffdb4d" /><stop offset="48%" stop-color="#ffc000" /><stop offset="50%" stop-color="#e6ac00" /><stop offset="100%" stop-color="#cc9900" />
        </linearGradient>
        <linearGradient id="prtgRed" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#ff4d4d" /><stop offset="48%" stop-color="#ff0000" /><stop offset="50%" stop-color="#e60000" /><stop offset="100%" stop-color="#cc0000" />
        </linearGradient>
        <linearGradient id="prtgGray" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#f0f0f0" /><stop offset="48%" stop-color="#d0d0d0" /><stop offset="50%" stop-color="#b0b0b0" /><stop offset="100%" stop-color="#909090" />
        </linearGradient>
        <filter id="prtgShadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.3" /></filter>
        <filter id="prtgBevel">
          <feGaussianBlur in="SourceAlpha" stdDeviation="0.5" result="blur" />
          <feSpecularLighting in="blur" surfaceScale="2" specularConstant="1" specularExponent="20" lighting-color="#ffffff" result="specOut"><fePointLight x="-5000" y="-10000" z="20000" /></feSpecularLighting>
          <feComposite in="specOut" in2="SourceAlpha" operator="in" result="specOut" />
          <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1" k4="0" result="litGraphic" />
        </filter>
      </defs>
    </svg>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Safe Library Access ---
        const getRecharts = () => window.Recharts || {};
        const getMotion = () => window.Motion || window.framerMotion || { motion: (p) => <div {...p} />, AnimatePresence: (p) => p.children };

        // --- Utility Functions ---
        const cn = (...classes) => classes.filter(Boolean).join(' ');

        function calculateVcpu(vcpu, freq, util) {
            const capacity = vcpu * freq;
            const utilization = capacity > 0 ? (util / capacity) * 100 : 0;
            const headroom = capacity - util;
            let status = utilization <= 80 ? { cls: 'ok', label: 'Normal', msg: 'Workload is within allocated capacity.' } :
                         utilization <= 100 ? { cls: 'hi', label: 'High', msg: 'Utilization is elevated. Monitor closely.' } :
                         { cls: 'ov', label: 'Overutilized', msg: 'Workload demand exceeds allocated capacity.' };
            return { capacity, observed: util, utilization, headroom, status };
        }

        function calculatePcpu(sockets, cores, threads, freq, utilPct, tdp) {
            const totalCores = sockets * cores;
            const totalLogical = totalCores * threads;
            const peakGhz = totalLogical * freq;
            const usedGhz = peakGhz * (utilPct / 100);
            const estPower = tdp ? sockets * tdp * (utilPct / 100) : null;
            let status = utilPct <= 80 ? { cls: 'ok', label: 'Normal', msg: 'Workload is within allocated capacity.' } :
                         utilPct <= 100 ? { cls: 'hi', label: 'High', msg: 'Utilization is elevated. Monitor closely.' } :
                         { cls: 'ov', label: 'Overutilized', msg: 'Workload demand exceeds allocated capacity.' };
            return { totalCores, totalLogical, peakGhz, usedGhz, utilization: utilPct, estPower, status };
        }

        function calculateSubnet(ipStr, maskStr) {
            if (!ipStr || !maskStr) return null;
            const parseMask = (mk) => {
                mk = String(mk).trim();
                if (/^\/?\d{1,2}$/.test(mk)) {
                    const p = parseInt(mk.replace('/', ''));
                    return (p >= 0 && p <= 32) ? p : null;
                }
                if (/^(\d{1,3}\.){3}\d{1,3}$/.test(mk)) {
                    const parts = mk.split('.').map(Number);
                    if (parts.some(p => p > 255)) return null;
                    const bin = parts.map(p => p.toString(2).padStart(8, '0')).join('');
                    return bin.split('').filter(b => b === '1').length;
                }
                return null;
            };
            const prefix = parseMask(maskStr);
            if (prefix === null) return null;
            const ipToNum = (ip) => ip.split('.').reduce((a, o) => (a << 8) | +o, 0) >>> 0;
            const numToIp = (n) => [(n >>> 24) & 255, (n >>> 16) & 255, (n >>> 8) & 255, n & 255].join('.');
            const maskNum = prefix === 0 ? 0 : (0xFFFFFFFF << (32 - prefix)) >>> 0;
            const ipNum = ipToNum(ipStr);
            const networkNum = ipNum & maskNum;
            const broadcastNum = networkNum | (~maskNum >>> 0);
            const usableHosts = prefix <= 30 ? Math.pow(2, 32 - prefix) - 2 : prefix === 31 ? 2 : 1;
            return {
                network: numToIp(networkNum),
                broadcast: numToIp(broadcastNum),
                mask: numToIp(maskNum),
                cidr: `/${prefix}`,
                range: `${numToIp(prefix < 31 ? networkNum + 1 : networkNum)} — ${numToIp(prefix < 31 ? broadcastNum - 1 : broadcastNum)}`,
                hosts: usableHosts,
                ipClass: ipStr.split('.')[0] < 128 ? 'A' : ipStr.split('.')[0] < 192 ? 'B' : 'C',
                ipType: ipStr.startsWith('10.') || ipStr.startsWith('192.168.') ? 'Private' : 'Public'
            };
        }

        function calculateStorage(drives, cap, raid, used, overhead, unit) {
            const factor = unit === 'GB' ? 1024 : 1;
            const capTB = (cap || 0) / factor;
            const usedTB = (used || 0) / factor;
            const rawTB = (drives || 0) * capTB;
            const getRaidUsable = (raw, drives, raid) => {
                switch (raid) {
                    case '0': return raw;
                    case '1': return raw / 2;
                    case '5': return raw * (drives - 1) / drives;
                    case '6': return raw * (drives - 2) / drives;
                    case '10': return raw / 2;
                    default: return raw;
                }
            };
            const usableTB = getRaidUsable(rawTB, drives, raid);
            const netAvailTB = usableTB * (1 - (overhead || 0) / 100);
            const freeTB = Math.max(netAvailTB - usedTB, 0);
            const utilization = netAvailTB > 0 ? (usedTB / netAvailTB) * 100 : 0;
            let status = utilization <= 70 ? { cls: 'ok', label: 'Normal', msg: 'Storage utilization is healthy.' } :
                         utilization <= 85 ? { cls: 'hi', label: 'High', msg: 'Utilization is elevated.' } :
                         { cls: 'ov', label: 'Critical', msg: 'Storage is critically full.' };
            return { raw: rawTB * factor, usable: usableTB * factor, netAvail: netAvailTB * factor, used: usedTB * factor, free: freeTB * factor, utilization, status };
        }

        // --- UI Components ---
        const StatusBadge = ({ status }) => {
            if (!status) return null;
            const colors = { ok: 'bg-[#e8f5e9] text-[#00b050] border-[#00b050]/20', hi: 'bg-[#fff9c4] text-[#f57f17] border-[#f57f17]/20', ov: 'bg-[#ffebee] text-[#b71c1c] border-[#b71c1c]/20' };
            return (
                <div className={cn("inline-flex items-center gap-2 rounded-sm border px-3 py-1 font-sans text-[11px] font-bold uppercase tracking-wider", colors[status.cls])}>
                    <div className={cn("h-2 w-2 rounded-full", status.cls === 'ok' ? 'bg-[#00b050]' : status.cls === 'hi' ? 'bg-[#ffc000]' : 'bg-[#ff0000]')} />
                    {status.label}
                </div>
            );
        };

        const MetricCard = ({ label, value, unit, status }) => {
            const statusColor = status === 'ok' ? '#00b050' : status === 'hi' ? '#ffc000' : status === 'ov' ? '#ff0000' : '#00b0f0';
            return (
                <div className="relative overflow-hidden rounded-sm border border-[var(--border)] bg-[var(--bg-card)] p-5 shadow-sm transition-all hover:shadow-md">
                    <div className="absolute top-0 left-0 h-full w-1" style={{ backgroundColor: statusColor }} />
                    <div className="font-sans text-[10px] font-bold tracking-wider uppercase text-[var(--text-sec)]">{label}</div>
                    <div className="mt-2 flex items-baseline gap-1.5">
                        <span className="font-sans text-2xl font-bold tracking-tight text-[var(--text-primary)]">{value}</span>
                        <span className="font-sans text-[10px] font-bold text-[var(--text-sec)] uppercase">{unit}</span>
                    </div>
                </div>
            );
        };

        const ProgressBar = ({ title, pct, status }) => {
            const { motion } = getMotion();
            const barColor = status === 'ok' ? 'var(--prtg-green)' : status === 'hi' ? 'var(--prtg-yellow)' : 'var(--prtg-red)';
            return (
                <div className="rounded-sm border border-[var(--border)] bg-[var(--bg-card)] p-6 shadow-sm">
                    <div className="mb-4 flex items-baseline justify-between">
                        <span className="font-sans text-[11px] font-bold tracking-[0.05em] uppercase text-[var(--text-sec)]">{title}</span>
                        <span className="font-sans text-2xl font-bold text-[var(--text-primary)]">{(pct || 0).toFixed(3)}%</span>
                    </div>
                    <div className="relative h-5 w-full overflow-hidden rounded-sm bg-[#e0e0e0] border border-black/10 shadow-inner">
                        <motion.div initial={{ width: 0 }} animate={{ width: `${Math.min(pct || 0, 100)}%` }} className="h-full relative" style={{ backgroundColor: barColor }}>
                            <div className="absolute inset-0 bg-gradient-to-b from-white/40 via-white/10 to-transparent h-[48%]" />
                            <div className="absolute inset-x-0 bottom-0 bg-black/5 h-[50%]" />
                        </motion.div>
                        <div className="absolute top-0 h-full w-px bg-red-500/30 z-10" style={{ left: '70%' }} />
                        <div className="absolute top-0 h-full w-px bg-red-600/40 z-10" style={{ left: '85%' }} />
                    </div>
                    <div className="mt-3 flex justify-between px-1"><span className="font-sans text-[10px] text-[var(--text-sec)]">0%</span><span className="font-sans text-[10px] text-[var(--text-sec)]">Warning 70%</span><span className="font-sans text-[10px] text-[var(--text-sec)]">Critical 85%</span></div>
                </div>
            );
        };

        // --- Main App Component ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('vcpu');
            const [theme, setTheme] = useState(localStorage.getItem('prtg-theme') || 'light');
            const [logo, setLogo] = useState(localStorage.getItem('prtg-logo') || null);
            const [vInput, setVInput] = useState({ vcpu: '72', freq: '3.2', util: '227.616' });
            const [pInput, setPInput] = useState({ sockets: '2', cores: '12', threads: '2', freq: '2.6', util: '45', tdp: '125' });
            const [snInput, setSnInput] = useState({ ip: '192.168.1.0', mask: '24' });
            const [stInput, setStInput] = useState({ drives: '12', cap: '1.2', raid: '10', used: '4.5', overhead: '15' });
            const [stUnit, setStUnit] = useState('TB');
            const [vResult, setVResult] = useState(null);
            const [pResult, setPResult] = useState(null);
            const [snResult, setSnResult] = useState(null);
            const [stResult, setStResult] = useState(null);

            const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, PieChart, Pie, Cell } = getRecharts();
            const { motion, AnimatePresence } = getMotion();

            useEffect(() => { handleVcpuCalc(); handlePcpuCalc(); handleSubnetCalc(); handleStorageCalc(); }, []);
            useEffect(() => { localStorage.setItem('prtg-theme', theme); document.documentElement.className = theme === 'light' ? '' : `theme-${theme}`; }, [theme]);

            const handleVcpuCalc = () => setVResult(calculateVcpu(parseFloat(vInput.vcpu), parseFloat(vInput.freq), parseFloat(vInput.util)));
            const handlePcpuCalc = () => setPResult(calculatePcpu(parseFloat(pInput.sockets), parseFloat(pInput.cores), parseFloat(pInput.threads), parseFloat(pInput.freq), parseFloat(pInput.util), pInput.tdp ? parseFloat(pInput.tdp) : null));
            const handleSubnetCalc = () => setSnResult(calculateSubnet(snInput.ip, snInput.mask));
            const handleStorageCalc = () => setStResult(calculateStorage(parseFloat(stInput.drives), parseFloat(stInput.cap), stInput.raid, parseFloat(stInput.used), parseFloat(stInput.overhead), stUnit));

            const handleLogoUpload = (e) => {
                const file = e.target.files[0];
                if (file) { const reader = new FileReader(); reader.onloadend = () => { setLogo(reader.result); localStorage.setItem('prtg-logo', reader.result); }; reader.readAsDataURL(file); }
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="sticky top-0 z-50 flex items-center justify-between border-b border-[var(--border)] bg-[var(--bg-card)] px-7 py-3.5 backdrop-blur-md transition-all">
                        <div className="flex items-center gap-3">
                            <div className="relative h-10 w-10 shrink-0">
                                {logo ? <img src={logo} alt="Logo" className="h-10 w-10 rounded-lg object-contain" /> : <div className="flex h-10 w-10 items-center justify-center rounded-lg bg-[var(--accent)] text-xl font-extrabold text-white">⚙</div>}
                                <label className="absolute -right-1 -bottom-1 flex h-4.5 w-4.5 cursor-pointer items-center justify-center rounded-full border border-[var(--border)] bg-[var(--bg-card)] text-[10px] transition-colors hover:bg-[var(--accent-dim)]">📁<input type="file" className="hidden" accept="image/*" onChange={handleLogoUpload} /></label>
                            </div>
                            <div><div className="text-[0.98rem] font-extrabold tracking-tight text-[var(--text-primary)]">IT Infrastructure Capacity Tools</div><div className="mt-0.5 font-mono text-[0.68rem] text-[var(--text-sec)]">infrastructure planning · v2.1 Standalone</div></div>
                        </div>
                        <div className="flex items-center gap-1 rounded-lg border border-[var(--border)] bg-[var(--bg-input)] p-1">
                            {['light', 'dark'].map(t => (
                                <button key={t} onClick={() => setTheme(t)} className={cn("px-3 py-1 text-[10px] font-bold uppercase rounded transition-all", theme === t ? "bg-[var(--accent)] text-white" : "text-[var(--text-sec)]")}>{t}</button>
                            ))}
                        </div>
                    </header>

                    <nav className="flex gap-0.5 overflow-x-auto border-b border-[var(--border)] bg-[var(--bg-card)] px-7 transition-all">
                        {['vcpu', 'pcpu', 'subnet', 'storage'].map((id) => (
                            <button key={id} onClick={() => setActiveTab(id)} className={cn("flex shrink-0 items-center gap-2 border-b-[2.5px] px-5 py-3 text-[0.8rem] font-bold tracking-wide transition-all", activeTab === id ? "border-[var(--accent)] text-[var(--accent)]" : "border-transparent text-[var(--text-sec)] hover:text-[var(--text-primary)]")}>{id.toUpperCase()}</button>
                        ))}
                    </nav>

                    <main className="mx-auto max-w-[960px] px-5 pt-8 pb-16 w-full">
                        <AnimatePresence mode="wait">
                            <motion.div key={activeTab} initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -10 }} className="space-y-8">
                                <div className="rounded-[var(--r)] border border-[var(--border)] bg-[var(--bg-card)] p-6 shadow-[var(--shadow)]">
                                    <div className="mb-4 font-mono text-[0.67rem] font-bold tracking-[0.12em] uppercase text-[var(--text-sec)]">Configuration Inputs</div>
                                    {activeTab === 'vcpu' && (<div className="grid grid-cols-1 gap-4.5 sm:grid-cols-3">
                                        <div className="flex flex-col gap-1.5"><label className="text-[0.76rem] font-semibold text-[var(--text-sec)]">vCPUs Allocated</label><input type="number" value={vInput.vcpu} onChange={e => setVInput({...vInput, vcpu: e.target.value})} className="w-full rounded-lg border-[1.5px] border-[var(--border)] bg-[var(--bg-input)] px-3 py-2 font-mono" /></div>
                                        <div className="flex flex-col gap-1.5"><label className="text-[0.76rem] font-semibold text-[var(--text-sec)]">Frequency (GHz)</label><input type="number" step="0.1" value={vInput.freq} onChange={e => setVInput({...vInput, freq: e.target.value})} className="w-full rounded-lg border-[1.5px] border-[var(--border)] bg-[var(--bg-input)] px-3 py-2 font-mono" /></div>
                                        <div className="flex flex-col gap-1.5"><label className="text-[0.76rem] font-semibold text-[var(--text-sec)]">Observed Load (GHz)</label><input type="number" step="0.1" value={vInput.util} onChange={e => setVInput({...vInput, util: e.target.value})} className="w-full rounded-lg border-[1.5px] border-[var(--border)] bg-[var(--bg-input)] px-3 py-2 font-mono" /></div>
                                    </div>)}
                                    {activeTab === 'pcpu' && (<div className="grid grid-cols-1 gap-4.5 sm:grid-cols-3">
                                        <div className="flex flex-col gap-1.5"><label className="text-[0.76rem] font-semibold text-[var(--text-sec)]">Sockets</label><input type="number" value={pInput.sockets} onChange={e => setPInput({...pInput, sockets: e.target.value})} className="w-full rounded-lg border-[1.5px] border-[var(--border)] bg-[var(--bg-input)] px-3 py-2 font-mono" /></div>
                                        <div className="flex flex-col gap-1.5"><label className="text-[0.76rem] font-semibold text-[var(--text-sec)]">Cores/Socket</label><input type="number" value={pInput.cores} onChange={e => setPInput({...pInput, cores: e.target.value})} className="w-full rounded-lg border-[1.5px] border-[var(--border)] bg-[var(--bg-input)] px-3 py-2 font-mono" /></div>
                                        <div className="flex flex-col gap-1.5"><label className="text-[0.76rem] font-semibold text-[var(--text-sec)]">Threads/Core</label><input type="number" value={pInput.threads} onChange={e => setPInput({...pInput, threads: e.target.value})} className="w-full rounded-lg border-[1.5px] border-[var(--border)] bg-[var(--bg-input)] px-3 py-2 font-mono" /></div>
                                    </div>)}
                                    {activeTab === 'subnet' && (<div className="grid grid-cols-1 gap-4.5 sm:grid-cols-2">
                                        <div className="flex flex-col gap-1.5"><label className="text-[0.76rem] font-semibold text-[var(--text-sec)]">Base IP</label><input type="text" value={snInput.ip} onChange={e => setSnInput({...snInput, ip: e.target.value})} className="w-full rounded-lg border-[1.5px] border-[var(--border)] bg-[var(--bg-input)] px-3 py-2 font-mono" /></div>
                                        <div className="flex flex-col gap-1.5"><label className="text-[0.76rem] font-semibold text-[var(--text-sec)]">Mask (CIDR or Dec)</label><input type="text" value={snInput.mask} onChange={e => setSnInput({...snInput, mask: e.target.value})} className="w-full rounded-lg border-[1.5px] border-[var(--border)] bg-[var(--bg-input)] px-3 py-2 font-mono" /></div>
                                    </div>)}
                                    {activeTab === 'storage' && (<div className="grid grid-cols-1 gap-4.5 sm:grid-cols-3">
                                        <div className="flex flex-col gap-1.5"><label className="text-[0.76rem] font-semibold text-[var(--text-sec)]">Drive Count</label><input type="number" value={stInput.drives} onChange={e => setStInput({...stInput, drives: e.target.value})} className="w-full rounded-lg border-[1.5px] border-[var(--border)] bg-[var(--bg-input)] px-3 py-2 font-mono" /></div>
                                        <div className="flex flex-col gap-1.5"><label className="text-[0.76rem] font-semibold text-[var(--text-sec)]">Capacity</label><input type="number" step="0.1" value={stInput.cap} onChange={e => setStInput({...stInput, cap: e.target.value})} className="w-full rounded-lg border-[1.5px] border-[var(--border)] bg-[var(--bg-input)] px-3 py-2 font-mono" /></div>
                                        <div className="flex flex-col gap-1.5"><label className="text-[0.76rem] font-semibold text-[var(--text-sec)]">RAID Level</label><select value={stInput.raid} onChange={e => setStInput({...stInput, raid: e.target.value})} className="w-full rounded-lg border-[1.5px] border-[var(--border)] bg-[var(--bg-input)] px-3 py-2 font-mono"><option value="0">RAID 0</option><option value="1">RAID 1</option><option value="5">RAID 5</option><option value="6">RAID 6</option><option value="10">RAID 10</option></select></div>
                                    </div>)}
                                    <div className="mt-6 flex gap-3">
                                        <button onClick={() => { if(activeTab === 'vcpu') handleVcpuCalc(); if(activeTab === 'pcpu') handlePcpuCalc(); if(activeTab === 'subnet') handleSubnetCalc(); if(activeTab === 'storage') handleStorageCalc(); }} className="rounded bg-[var(--accent)] px-8 py-2.5 text-sm font-bold text-white hover:opacity-90 shadow-md">Calculate Now</button>
                                        <button onClick={() => { if(activeTab === 'vcpu') setVInput({vcpu: '128', freq: '2.4', util: '150'}); if(activeTab === 'pcpu') setPInput({sockets: '2', cores: '16', threads: '2', freq: '2.9', util: '75', tdp: '205'}); if(activeTab === 'subnet') setSnInput({ip: '10.10.0.0', mask: '22'}); if(activeTab === 'storage') setStInput({drives: '24', cap: '4', raid: '6', used: '40', overhead: '10'}); }} className="px-4 py-2 text-xs font-bold text-[var(--accent)] border border-[var(--accent)] rounded hover:bg-[var(--accent-dim)]">Load Sample</button>
                                    </div>
                                </div>

                                {((activeTab === 'vcpu' && vResult) || (activeTab === 'pcpu' && pResult) || (activeTab === 'subnet' && snResult) || (activeTab === 'storage' && stResult)) && (
                                    <>
                                        <div className="grid grid-cols-2 gap-3.5 sm:grid-cols-4">
                                            {activeTab === 'vcpu' && vResult && (<><MetricCard label="Total Capacity" value={vResult.capacity.toLocaleString()} unit="GHz" /><MetricCard label="Observed" value={vResult.observed.toLocaleString()} unit="GHz" /><MetricCard label="Utilization %" value={vResult.utilization.toFixed(2)} unit="%" status={vResult.status.cls} /><MetricCard label="Headroom" value={vResult.headroom.toLocaleString()} unit="GHz" /></>)}
                                            {activeTab === 'pcpu' && pResult && (<><MetricCard label="Logical Procs" value={pResult.totalLogical} unit="Threads" /><MetricCard label="Peak GHz" value={pResult.peakGhz.toFixed(1)} unit="GHz" /><MetricCard label="Used GHz" value={pResult.usedGhz.toFixed(1)} unit="GHz" status={pResult.status.cls} /><MetricCard label="Est Power" value={pResult.estPower ? pResult.estPower.toFixed(0) : 'N/A'} unit="Watts" /></>)}
                                            {activeTab === 'subnet' && snResult && (<><MetricCard label="Usable Hosts" value={snResult.hosts.toLocaleString()} unit="IPs" /><MetricCard label="Network ID" value={snResult.network} unit="" /><MetricCard label="Mask" value={snResult.mask} unit="" /><MetricCard label="CIDR" value={snResult.cidr} unit="" /></>)}
                                            {activeTab === 'storage' && stResult && (<><MetricCard label="Usable Cap" value={stResult.usable.toFixed(2)} unit={stUnit} /><MetricCard label="Used Space" value={stResult.used.toFixed(2)} unit={stUnit} status={stResult.status.cls} /><MetricCard label="Free Space" value={stResult.free.toFixed(2)} unit={stUnit} /><MetricCard label="Net Avail" value={stResult.netAvail.toFixed(2)} unit={stUnit} /></>)}
                                        </div>
                                        {activeTab !== 'subnet' && (<ProgressBar title="Utilization vs Capacity" pct={activeTab === 'vcpu' ? vResult.utilization : activeTab === 'pcpu' ? pResult.utilization : stResult.utilization} status={activeTab === 'vcpu' ? vResult.status.cls : activeTab === 'pcpu' ? pResult.status.cls : stResult.status.cls} />)}
                                        {BarChart && (<div className="grid grid-cols-1 gap-5 sm:grid-cols-2">
                                            <div className="rounded-[var(--r)] border border-[var(--border)] bg-[var(--bg-card)] p-6 shadow-[var(--shadow)]">
                                                <div className="mb-6 font-mono text-[11px] font-bold tracking-[0.15em] uppercase text-[var(--text-sec)]">Capacity Breakdown</div>
                                                <div className="h-[240px] w-full">
                                                    <ResponsiveContainer width="100%" height="100%">
                                                        <BarChart layout="vertical" data={activeTab === 'vcpu' ? [{ name: 'CPU', used: vResult.observed, free: Math.max(0, vResult.headroom) }] : activeTab === 'pcpu' ? [{ name: 'CPU', used: pResult.usedGhz, free: Math.max(0, pResult.peakGhz - pResult.usedGhz) }] : activeTab === 'storage' ? [{ name: 'Storage', used: stResult.used, free: Math.max(0, stResult.usable - stResult.used) }] : [{ name: 'Hosts', used: snResult.hosts, free: 0 }]}>
                                                            <CartesianGrid strokeDasharray="3 3" horizontal={false} stroke="var(--border)" opacity={0.4} /><XAxis type="number" fontSize={10} fontFamily="JetBrains Mono" stroke="var(--text-sec)" /><YAxis type="category" dataKey="name" hide /><Tooltip />
                                                            <Bar dataKey="used" name="Used" stackId="a" fill="url(#prtgGreen)" filter="url(#prtgBevel)" radius={[2, 0, 0, 2]} barSize={32} /><Bar dataKey="free" name="Free" stackId="a" fill="url(#prtgGray)" filter="url(#prtgShadow)" radius={[0, 2, 2, 0]} barSize={32} />
                                                        </BarChart>
                                                    </ResponsiveContainer>
                                                </div>
                                            </div>
                                            <div className="rounded-[var(--r)] border border-[var(--border)] bg-[var(--bg-card)] p-6 shadow-[var(--shadow)]">
                                                <div className="mb-6 font-mono text-[11px] font-bold tracking-[0.15em] uppercase text-[var(--text-sec)]">Utilization Share</div>
                                                <div className="h-[240px] w-full">
                                                    <ResponsiveContainer width="100%" height="100%">
                                                        <PieChart>
                                                            <Pie data={activeTab === 'vcpu' ? [{ name: 'Used', value: vResult.observed }, { name: 'Free', value: Math.max(0, vResult.headroom) }] : activeTab === 'pcpu' ? [{ name: 'Used', value: pResult.usedGhz }, { name: 'Free', value: Math.max(0, pResult.peakGhz - pResult.usedGhz) }] : activeTab === 'storage' ? [{ name: 'Used', value: stResult.used }, { name: 'Free', value: Math.max(0, stResult.usable - stResult.used) }] : [{ name: 'Network', value: 1 }, { name: 'Hosts', value: snResult.hosts }]} cx="50%" cy="50%" innerRadius={60} outerRadius={85} paddingAngle={3} dataKey="value" stroke="var(--bg-card)" strokeWidth={2}>
                                                                <Cell fill="url(#prtgGreen)" filter="url(#prtgBevel)" /><Cell fill="url(#prtgGray)" filter="url(#prtgShadow)" />
                                                            </Pie><Tooltip />
                                                        </PieChart>
                                                    </ResponsiveContainer>
                                                </div>
                                            </div>
                                        </div>)}
                                    </>
                                )}
                            </motion.div>
                        </AnimatePresence>
                    </main>
                    <footer className="mt-auto bg-[var(--bg-card)] border-t border-[var(--border)] px-7 py-4 flex items-center justify-between text-[10px] font-bold uppercase tracking-widest text-[var(--text-sec)]">
                        <div>&copy; 2024 SABA IT Infrastructure Capacity Tools</div><div className="flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.4)]" /><span>System Ready</span></div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
